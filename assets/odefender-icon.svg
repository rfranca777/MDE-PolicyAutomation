<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c2ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b2dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0052cc;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a" />
      <stop offset="100%" style="stop-color:#0d1b2a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="url(#shieldGrad)" stroke-width="4"/>
  
  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00c2ff" stroke-width="1.5" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Shield body -->
  <path d="M256 68 L400 140 L400 270 C400 350 340 410 256 444 C172 410 112 350 112 270 L112 140 Z" 
        fill="url(#shieldGrad)" opacity="0.95" filter="url(#glow)"/>
  
  <!-- Shield inner border -->
  <path d="M256 88 L384 152 L384 268 C384 338 330 392 256 424 C182 392 128 338 128 268 L128 152 Z" 
        fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>

  <!-- Shield inner fill -->
  <path d="M256 108 L368 164 L368 266 C368 326 320 374 256 404 C192 374 144 326 144 266 L144 164 Z" 
        fill="#0a0a1a" opacity="0.85"/>

  <!-- "O" letter — the ODefender mark -->
  <circle cx="256" cy="240" r="60" fill="none" stroke="url(#innerGlow)" stroke-width="12" filter="url(#glow)"/>
  
  <!-- Eye/scanner inside the O — represents detection/monitoring -->
  <circle cx="256" cy="240" r="20" fill="#00c2ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="8" fill="#ffffff" opacity="0.95"/>
  
  <!-- Scan lines radiating from eye -->
  <line x1="256" y1="200" x2="256" y2="172" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="280" x2="256" y2="308" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="216" y1="240" x2="188" y2="240" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  <line x1="296" y1="240" x2="324" y2="240" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Diagonal scan lines -->
  <line x1="228" y1="212" x2="212" y2="196" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="284" y1="212" x2="300" y2="196" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="228" y1="268" x2="212" y2="284" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="284" y1="268" x2="300" y2="284" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>

  <!-- "DEFENDER" text arc at bottom of shield -->
  <text x="256" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" 
        font-size="28" font-weight="700" letter-spacing="6" fill="#00c2ff" filter="url(#glow)">
    DEFENDER
  </text>
  
  <!-- Small "O" prefix -->
  <text x="256" y="345" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" 
        font-size="16" font-weight="300" letter-spacing="12" fill="#ffffff" opacity="0.7">
    COMMUNITY
  </text>
</svg>
